services:
  nextjs:
    build: .
    restart: always
    networks:
      - webnet
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - nextjs
    restart: always
    networks:
      - webnet

networks:
  webnet:
